name: Deploy Client to Lightsail
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/deploy.yml'
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "version=$(git describe --tags --always)" >> $GITHUB_OUTPUT

      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - name: Build (.env.production 주입)
        env:
          VITE_API_BASE_URL: https://api.poposafari.net/api
          VITE_SOCKET_SERVER_URL: https://socket.poposafari.net
        run: pnpm build

      - name: Notify Discord (start)
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"content\":\"🎨 클라이언트 배포 시작 \`${{ steps.meta.outputs.version }}\` (SHA \`${{ steps.meta.outputs.sha }}\`)\"}" \
            ${{ secrets.DISCORD_WEBHOOK_DEPLOY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync to staging dir
        run: |
          # 1) 임시 디렉토리(.new)에 먼저 업로드 — 라이브 디렉토리 영향 0
          ssh -i ~/.ssh/lightsail.pem ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} \
            'sudo rm -rf /var/www/poposafari.new && \
             sudo mkdir -p /var/www/poposafari.new && \
             sudo chown ubuntu:ubuntu /var/www/poposafari.new'
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/lightsail.pem" \
            dist/ \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/var/www/poposafari.new/

      - name: Atomic swap + 이전 버전 보존
        run: |
          # 2) 라이브 → .old, .new → 라이브 (mv는 same-fs rename이라 inode 단위 atomic)
          ssh -i ~/.ssh/lightsail.pem ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} \
            'sudo rm -rf /var/www/poposafari.old && \
             sudo mv /var/www/poposafari /var/www/poposafari.old && \
             sudo mv /var/www/poposafari.new /var/www/poposafari'

      - name: Nginx restart (bind mount inode 재바인딩)
        run: |
          # docker bind mount는 mount 시점의 inode를 잡아 dir mv 후에도 옛 inode를 따라간다.
          # restart로 컨테이너가 새 디렉토리 inode를 다시 잡게 한다 (1~2초 다운타임).
          ssh -i ~/.ssh/lightsail.pem ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} \
            'cd ~/poposafari/server/docker/prod && docker compose restart nginx'

      - name: Notify Discord (success)
        if: success()
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"content\":\"✅ 클라이언트 배포 완료 \`${{ steps.meta.outputs.version }}\` (SHA \`${{ steps.meta.outputs.sha }}\`)\"}" \
            ${{ secrets.DISCORD_WEBHOOK_DEPLOY }}

      - name: Notify Discord (failure)
        if: failure()
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"content\":\"❌ 클라이언트 배포 실패 — 즉시 확인 필요 (@here)\"}" \
            ${{ secrets.DISCORD_WEBHOOK_DEPLOY }}
